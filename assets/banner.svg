<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020818"/>
      <stop offset="50%" style="stop-color:#060e2a"/>
      <stop offset="100%" style="stop-color:#0a0520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="30%" style="stop-color:#3b82f6"/>
      <stop offset="65%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="meshLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#020818;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#06b6d4;stop-opacity:0.7"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#8b5cf6;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#020818;stop-opacity:0"/>
    </linearGradient>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleGlow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="40" y1="0" x2="0" y2="40" stroke="#06b6d4" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <pattern id="dots" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="0.8" fill="#3b82f6" opacity="0.25"/>
      <circle cx="0" cy="0" r="0.5" fill="#8b5cf6" opacity="0.2"/>
      <circle cx="60" cy="60" r="0.5" fill="#06b6d4" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>
  <rect width="1200" height="340" fill="url(#dots)"/>

  <!-- Mesh topology — left cluster -->
  <line x1="60" y1="110" x2="340" y2="165" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="170" x2="340" y2="170" stroke="url(#meshLine)" stroke-width="1.5" opacity="0.5"/>
  <line x1="60" y1="230" x2="340" y2="175" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="140" y1="80" x2="340" y2="160" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
  <line x1="140" y1="260" x2="340" y2="180" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
  <!-- Cross-connects for mesh feel -->
  <line x1="60" y1="110" x2="140" y2="260" stroke="#06b6d4" stroke-width="0.5" opacity="0.12"/>
  <line x1="60" y1="230" x2="140" y2="80" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12"/>
  <line x1="140" y1="80" x2="220" y2="200" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="140" y1="260" x2="220" y2="140" stroke="#06b6d4" stroke-width="0.5" opacity="0.15"/>

  <!-- Mesh topology — right cluster -->
  <line x1="860" y1="165" x2="1140" y2="110" stroke="#8b5cf6" stroke-width="1" opacity="0.3"/>
  <line x1="860" y1="170" x2="1140" y2="170" stroke="url(#meshLine)" stroke-width="1.5" opacity="0.5"/>
  <line x1="860" y1="175" x2="1140" y2="230" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
  <line x1="860" y1="160" x2="1060" y2="80" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
  <line x1="860" y1="180" x2="1060" y2="260" stroke="#3b82f6" stroke-width="0.8" opacity="0.2"/>
  <line x1="1140" y1="110" x2="1060" y2="260" stroke="#8b5cf6" stroke-width="0.5" opacity="0.12"/>
  <line x1="1140" y1="230" x2="1060" y2="80" stroke="#06b6d4" stroke-width="0.5" opacity="0.12"/>
  <line x1="1060" y1="80" x2="980" y2="200" stroke="#3b82f6" stroke-width="0.5" opacity="0.15"/>
  <line x1="1060" y1="260" x2="980" y2="140" stroke="#8b5cf6" stroke-width="0.5" opacity="0.15"/>

  <!-- Left nodes -->
  <circle cx="60" cy="110" r="7" fill="#06b6d4" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="60" cy="170" r="8" fill="#3b82f6" opacity="0.95" filter="url(#nodeGlow)"/>
  <circle cx="60" cy="230" r="7" fill="#8b5cf6" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="140" cy="80" r="5" fill="#06b6d4" opacity="0.6" filter="url(#soft)"/>
  <circle cx="140" cy="260" r="5" fill="#8b5cf6" opacity="0.6" filter="url(#soft)"/>
  <circle cx="220" cy="140" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="220" cy="200" r="4" fill="#06b6d4" opacity="0.5"/>
  <circle cx="285" cy="158" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="285" cy="182" r="3" fill="#3b82f6" opacity="0.4"/>

  <!-- Right nodes -->
  <circle cx="1140" cy="110" r="7" fill="#8b5cf6" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="1140" cy="170" r="8" fill="#3b82f6" opacity="0.95" filter="url(#nodeGlow)"/>
  <circle cx="1140" cy="230" r="7" fill="#06b6d4" opacity="0.9" filter="url(#nodeGlow)"/>
  <circle cx="1060" cy="80" r="5" fill="#8b5cf6" opacity="0.6" filter="url(#soft)"/>
  <circle cx="1060" cy="260" r="5" fill="#06b6d4" opacity="0.6" filter="url(#soft)"/>
  <circle cx="980" cy="140" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="980" cy="200" r="4" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="915" cy="158" r="3" fill="#06b6d4" opacity="0.4"/>
  <circle cx="915" cy="182" r="3" fill="#3b82f6" opacity="0.4"/>

  <!-- Node labels -->
  <text x="60" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#06b6d4" opacity="0.8">agent</text>
  <text x="60" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6" opacity="0.8">human</text>
  <text x="60" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b5cf6" opacity="0.8">system</text>
  <text x="1140" y="98" text-anchor="middle" font-family="monospace" font-size="8" fill="#8b5cf6" opacity="0.8">worker</text>
  <text x="1140" y="158" text-anchor="middle" font-family="monospace" font-size="8" fill="#3b82f6" opacity="0.8">service</text>
  <text x="1140" y="248" text-anchor="middle" font-family="monospace" font-size="8" fill="#06b6d4" opacity="0.8">agent</text>

  <!-- Central mesh hub -->
  <rect x="350" y="108" width="500" height="124" rx="16" fill="#050d2a"/>
  <rect x="350" y="108" width="500" height="124" rx="16" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
  <rect x="352" y="110" width="496" height="120" rx="15" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.3"/>
  <rect x="354" y="112" width="492" height="116" rx="14" fill="none" stroke="#8b5cf6" stroke-width="0.3" opacity="0.2"/>

  <!-- Border pulse dots -->
  <circle cx="600" cy="108" r="3" fill="#3b82f6" opacity="0.9" filter="url(#soft)"/>
  <circle cx="600" cy="232" r="3" fill="#3b82f6" opacity="0.9" filter="url(#soft)"/>
  <circle cx="350" cy="170" r="3" fill="#06b6d4" opacity="0.9" filter="url(#soft)"/>
  <circle cx="850" cy="170" r="3" fill="#8b5cf6" opacity="0.9" filter="url(#soft)"/>

  <!-- Title -->
  <text x="600" y="157" text-anchor="middle"
        font-family="'SF Mono','Fira Code','Cascadia Code',monospace"
        font-size="44" font-weight="700"
        fill="url(#titleGrad)" filter="url(#titleGlow)">agentmesh</text>

  <!-- Subtitle -->
  <text x="600" y="182" text-anchor="middle"
        font-family="'SF Mono','Fira Code',monospace"
        font-size="12" fill="#94a3b8" opacity="0.9" letter-spacing="2">
    Agent-native event bus for production AI systems.
  </text>

  <!-- Tagline -->
  <text x="600" y="276" text-anchor="middle"
        font-family="'SF Mono','Fira Code',monospace"
        font-size="10" fill="#475569" opacity="0.85" letter-spacing="1.5">
    Pub/Sub · Consumer Groups · Replay · DLQ · NATS Wildcards · OTel · Zero-dep core
  </text>

  <!-- Corner decorations -->
  <rect x="18" y="18" width="32" height="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="18" y="18" width="2" height="32" fill="#06b6d4" opacity="0.5"/>
  <rect x="1150" y="18" width="32" height="2" fill="#8b5cf6" opacity="0.4"/>
  <rect x="1180" y="18" width="2" height="32" fill="#8b5cf6" opacity="0.4"/>
  <rect x="18" y="320" width="32" height="2" fill="#3b82f6" opacity="0.4"/>
  <rect x="18" y="290" width="2" height="32" fill="#3b82f6" opacity="0.4"/>
  <rect x="1150" y="320" width="32" height="2" fill="#06b6d4" opacity="0.5"/>
  <rect x="1180" y="290" width="2" height="32" fill="#06b6d4" opacity="0.5"/>

  <!-- Version badge -->
  <rect x="530" y="196" width="140" height="20" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="0.8" opacity="0.8"/>
  <text x="600" y="210" text-anchor="middle" font-family="monospace" font-size="9" fill="#3b82f6" opacity="0.9">v0.1.0 · Apache 2.0</text>
</svg>
