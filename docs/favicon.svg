<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="#050d2a"/>
  <!-- Mesh topology: center node + 4 outer nodes + connecting lines -->
  <circle cx="16" cy="16" r="4" fill="#3b82f6" opacity="0.95"/>
  <circle cx="6"  cy="10" r="3" fill="#06b6d4" opacity="0.9"/>
  <circle cx="26" cy="10" r="3" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="6"  cy="22" r="3" fill="#8b5cf6" opacity="0.9"/>
  <circle cx="26" cy="22" r="3" fill="#06b6d4" opacity="0.9"/>
  <!-- Lines from center to outer -->
  <line x1="16" y1="12" x2="8"  y2="12" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="12" x2="24" y2="12" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="20" x2="8"  y2="20" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <line x1="16" y1="20" x2="24" y2="20" stroke="#3b82f6" stroke-width="1.2" opacity="0.7"/>
  <!-- Cross lines for mesh feel -->
  <line x1="8" y1="12" x2="8"  y2="20" stroke="#06b6d4" stroke-width="0.8" opacity="0.5"/>
  <line x1="24" y1="12" x2="24" y2="20" stroke="#8b5cf6" stroke-width="0.8" opacity="0.5"/>
</svg>
